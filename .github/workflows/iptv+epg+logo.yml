name: iptv+epg+logo
permissions:
  contents: write
on:
  # 北京时间早上8点 = UTC 0点
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  make_m3u:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: Python环境
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: 下载源并生成tv.m3u
        run: |
          WGET_ARGS="--timeout=15 --retry-connrefused --tries=3 --no-check-certificate"
          wget $WGET_ARGS -O source_tmp.txt http://iptv.aiga.cc/txt || true

          python3 << EOF
          import os
          import urllib.parse

          # 配置
          epg_link = "https://raw.githubusercontent.com/kuke31/xmlgz/main/e.xml.gz"
          logo_base = "https://tvbox.aiga.cc/logo/"
          out_name = "tv.m3u"
          lines = [f'#EXTM3U x-tvg-url="{epg_link}"']

          if os.path.exists("source_tmp.txt") and os.path.getsize("source_tmp.txt") > 0:
              with open("source_tmp.txt", "r", encoding="utf-8", errors="ignore") as f:
                  for raw_line in f:
                      l = raw_line.strip()
                      if not l or "," not in l:
                          continue
                      ch_name, url = l.split(",", 1)
                      safe_ch = urllib.parse.quote(ch_name)
                      logo_url = f"{logo_base}{safe_ch}.png"
                      lines.append(f'#EXTINF:-1 tvg-logo="{logo_url}",{ch_name}')
                      lines.append(url)

          with open(out_name, "w", encoding="utf-8") as fw:
              fw.write("\n".join(lines))
          EOF

          rm -f source_tmp.txt

      - name: 提交推送
        run: |
          git config --local user.name "Github Actions Bot"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add tv.m3u
          git diff --quiet && git diff --staged --quiet || git commit -m "自动更新tv.m3u(EPG+LOGO)"
          git push
