name: iptv+epg+logo2
permissions:
  contents: write
on:
  # 北京时间凌晨3点 = UTC 19点
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:

jobs:
  make_m3u:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: Python环境
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: 下载原始M3U源（失败重试+空文件校验）
        run: |
          WGET_ARGS="--timeout=15 --retry-connrefused --tries=3 --no-check-certificate"
          wget $WGET_ARGS -O raw_source.m3u https://iptv.aiga.cc || true
          # 校验文件是否下载成功且非空
          if [ ! -f "raw_source.m3u" ] || [ ! -s "raw_source.m3u" ]; then
            echo "源文件下载失败或为空，终止任务"
            exit 1
          fi

      - name: 处理M3U：每条频道插入tvg-link + 中文台标URL编码
        run: |
          python3 << EOF
          import os
          import urllib.parse
          import re

          # 配置参数
          epg_link = "https://snail.aiga.cc/tvbox/iptv-api/epg/epg.xml"
          logo_base = "https://tvbox.aiga.cc/logo/"
          out_name = "tv.m3u"
          raw_file = "raw_source.m3u"

          # 正则1：匹配 tvg-logo="xxx" 做中文URL编码
          logo_regex = re.compile(r'(tvg-logo=")([^"]+)(")')
          # 正则2：匹配完整#EXTINF行，末尾插入tvg-link字段
          extinf_regex = re.compile(r'(#EXTINF:-1.*?)(,.*?$)', re.MULTILINE)

          def encode_logo_path(match):
              pre = match.group(1)
              logo_full = match.group(2)
              suf = match.group(3)
              # 仅处理当前域名台标，外部logo不改动
              if logo_full.startswith(logo_base):
                  file_name = logo_full[len(logo_base):]
                  safe_name = urllib.parse.quote(file_name)
                  new_logo = logo_base + safe_name
                  return f"{pre}{new_logo}{suf}"
              return match.group(0)

          def add_tvg_link(match):
              extinf_body = match.group(1)
              channel_name = match.group(2)
              # 在#EXTINF行末尾追加标准tvg-link，兼容双播放器
              return f'{extinf_body} tvg-link="{epg_link}"{channel_name}'

          # 读取原始m3u全部内容
          with open(raw_file, "r", encoding="utf-8", errors="ignore") as f:
              raw_content = f.read()

          # 移除原有自带 #EXTM3U 头部
          clean_content = re.sub(r'^#EXTM3U.*?\n', "", raw_content, count=1, flags=re.M)
          # 1. 批量编码所有中文台标链接
          fixed_content = logo_regex.sub(encode_logo_path, clean_content)
          # 2. 每条EXTINF行插入标准tvg-link EPG字段
          final_content = extinf_regex.sub(add_tvg_link, fixed_content)
          # 纯净无全局EPG头部，无多余空行
          final_text = f'#EXTM3U\n{final_content}'

          # 输出到仓库根目录 tv.m3u
          with open(out_name, "w", encoding="utf-8") as fw:
              fw.write(final_text)
          EOF

      - name: 清理临时文件
        run: |
          rm -f raw_source.m3u

      - name: 提交推送更新
        run: |
          git config --local user.name "Github Actions Bot"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add tv.m3u
          git diff --quiet && git diff --staged --quiet || git commit -m "定时更新标准直播源 tv.m3u"
          git push
