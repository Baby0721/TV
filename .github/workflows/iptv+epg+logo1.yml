name: iptv+epg+logo1
permissions:
  contents: write
on:
  schedule:
    - cron: "0 20 * * *"
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  make_m3u:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: Python环境
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: 【终极根治】清除风控域名+俊版标准EPG+格式归一
        run: |
          python3 << EOF
          import re

          # 全网唯一俊版兼容、零报错、永久稳定EPG
          FINAL_STABLE_EPG = "https://epg.112114.xyz/pp.xml"
          OUT_FILE = "tm1.m3u"

          # 读取本地存量源
          with open(OUT_FILE, "r", encoding="utf-8", errors="ignore") as f:
              content = f.read()

          # 1. 清除所有旧头部
          content = re.sub(r'^#EXTM3U.*\n', "", content, flags=re.M)
          # 2. 强制俊版标准时长 -1
          content = re.sub(r'#EXTINF:\d+', "#EXTINF:-1", content)
          # 3. 【最关键】彻底删除所有 aiga.cc 台标字段（根除俊版风控）
          content = re.sub(r' tvg-logo="https://tvbox.aiga.cc/logo/[^"]+"', "", content)
          # 4. 清理空行BUG
          content = re.sub(r'\n\s*\n+', r'\n', content).strip()

          # 纯标准俊版头部，无任何风控域名
          final_text = f'#EXTM3U x-tvg-url="{FINAL_STABLE_EPG}"\n{content}\n'

          with open(OUT_FILE, "w", encoding="utf-8") as f:
              f.write(final_text)

          print("✅ 终极根治完成：无风控、无默认图标、EPG稳定生效")
          EOF

      - name: 提交永久稳定文件
        run: |
          git config --local user.name "Github Actions Bot"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add tm1.m3u
          git diff --staged --quiet || git commit -m "🔥 终极根治｜移除风控域名+稳定EPG满血"
          git push
