name: Auto Sync IPTV with Email
on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

jobs:
  sync-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Get old file hash
        id: hash_check
        run: |
          if [ -f "iptv-fe.txt" ]; then
            OLD_HASH=$(sha256sum iptv-fe.txt | awk '{print $1}')
            echo "old_hash=$OLD_HASH" >> $GITHUB_OUTPUT
          else
            echo "old_hash=none" >> $GITHUB_OUTPUT
            echo "旧版iptv-fe.txt不存在，后续将首次生成文件"
          fi

      - name: Download IPTV sources
        id: download
        run: |
          echo "开始拉取远程播放源"
          # 下载migu源文件
          curl -v -s -L --connect-timeout 15 --retry 4 --retry-delay 3 -o migu.m3u "https://raw.githubusercontent.com/ioptu/migu_video/main/migu.m3u"
          if [ ! -s migu.m3u ]; then
            echo "::error::migu源下载失败，网络连通异常"
            exit 1
          fi
          # 下载cctv源文件
          curl -v -s -L --connect-timeout 15 --retry 4 --retry-delay 3 -o cctv_raw.m3u "https://raw.githubusercontent.com/ioptu/migu_video/main/cctv.migu.m3u"
          if [ ! -s cctv_raw.m3u ]; then
            echo "::error::cctv源下载失败，网络连通异常"
            exit 1
          fi
          echo "两个远程源全部下载完毕"

          # 给央视源统一添加分组标签
          sed -i 's/\(tvg-logo="[^"]*"\)/\1,group-title="央视专版",/' cctv_raw.m3u

          # 核心处理：解析m3u、保留频道名、按链接去重、生成标准TXT
          echo "开始解析频道信息、去重、生成标准TXT订阅文件"
          cat migu.m3u cctv_raw.m3u | awk '
            /^#EXTINF:/ {
              sub(/.*,/, "", $0);
              name=$0;
              next;
            }
            /^http/ {
              print name "," $0
            }
          ' | sort -t ',' -k2 -u > new-iptv.txt

          # 校验文件有效性
          if [ ! -s new-iptv.txt ]; then
            echo "::error::源文件处理后无有效频道数据"
            exit 1
          fi
          echo "处理完成：已保留频道名称、自动剔除重复链接，生成标准TXT订阅文件"

          # 计算新文件哈希
          NEW_HASH=$(sha256sum new-iptv.txt | awk '{print $1}')
          echo "new_hash=$NEW_HASH" >> $GITHUB_OUTPUT

          # 清理临时文件
          rm -f migu.m3u cctv_raw.m3u

      - name: Compare file hash
        id: compare
        run: |
          OLD_HASH=${{ steps.hash_check.outputs.old_hash }}
          NEW_HASH=${{ steps.download.outputs.new_hash }}
          echo "旧哈希：$OLD_HASH  新哈希：$NEW_HASH"
          if [ "$OLD_HASH" = "$NEW_HASH" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Push new txt file
        if: steps.compare.outputs.changed == 'true'
        run: |
          mv new-iptv.txt iptv.txt
          git config --global user.name "Actions Bot"
          git config --global user.email "actions@github.com"
          git add iptv.txt
          git commit -m "Auto update IPTV [去重+保留频道名 TXT格式] $(date -u '+%Y-%m-%d %H:%M')"
          git push origin main
          echo "IPTV源更新完成：自动去重、保留全量频道信息"

      - name: No change skip
        if: steps.compare.outputs.changed == 'false'
        run: echo "源内容无变动，跳过更新提交"
