name: Auto Sync IPTV with Email

on:
  schedule:
    # UTC 0点、12点，12小时运行一次
    - cron: '0 0,12 * * *'
  workflow_dispatch:

jobs:
  sync-and-notify:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout your repo
      uses: actions/checkout@v5
      with:
        token: ${{ secrets.PAT_TOKEN }}
    
    - name: Check current file hash
      id: hash_check
      run: |
        if [ -f "iptv-fe.m3u" ]; then
          OLD_HASH=$(sha256sum iptv-fe.m3u | awk '{print $1}')
          echo "old_hash=$OLD_HASH" >> $GITHUB_OUTPUT
        else
          echo "old_hash=none" >> $GITHUB_OUTPUT
        fi
    
    # 下载源、修改央视分组、合并文件，无去重
    - name: Download, fix, merge source files
      id: download
      run: |
        MAIN_BRANCH="main"

        curl -s -L --connect-timeout 10 --retry 3 -o migu.m3u "https://raw.githubusercontent.com/ioptu/migu_video/main/migu.m3u"
        if [ ! -s migu.m3u ]; then
          echo "ERROR: migu.m3u 源下载失败，文件为空"
          exit 1
        fi

        curl -s -L --connect-timeout 10 --retry 3 -o cctv_raw.m3u "https://raw.githubusercontent.com/ioptu/migu_video/main/cctv.migu.m3u"
        if [ ! -s cctv_raw.m3u ]; then
          echo "ERROR: cctv.migu.m3u 源下载失败，文件为空"
          exit 1
        fi
        
        sed -i.bak 's/\(tvg-logo="[^"]*"\)/\1,group-title="央视专版",/' cctv_raw.m3u
        rm -f cctv_raw.m3u.bak
        
        # 合并逻辑
        head -1 migu.m3u | grep -q "^#EXTM3U" && has_header1=true || has_header1=false
        if [ "$has_header1" = true ]; then
          cat migu.m3u > new-iptv.m3u
        else
          echo "#EXTM3U" > new-iptv.m3u
          cat migu.m3u >> new-iptv.m3u
        fi
        
        head -1 cctv_raw.m3u | grep -q "^#EXTM3U" && has_header2=true || has_header2=false
        if [ "$has_header2" = true ]; then
          tail -n +2 cctv_raw.m3u >> new-iptv.m3u
        else
          cat cctv_raw.m3u >> new-iptv.m3u
        fi

        NEW_HASH=$(sha256sum new-iptv.m3u | awk '{print $1}')
        echo "new_hash=$NEW_HASH" >> $GITHUB_OUTPUT
        LINES1=$(wc -l < migu.m3u)
        LINES2=$(wc -l < cctv_raw.m3u)
        echo "source1_lines=$LINES1" >> $GITHUB_OUTPUT
        echo "source2_lines=$LINES2" >> $GITHUB_OUTPUT

        rm -f migu.m3u cctv_raw.m3u
    
    - name: Compare old & new file hash
      id: compare
      run: |
        OLD_HASH=${{ steps.hash_check.outputs.old_hash }}
        NEW_HASH=${{ steps.download.outputs.new_hash }}
        if [ "$OLD_HASH" == "$NEW_HASH" ]; then
          echo "changed=false" >> $GITHUB_OUTPUT
        else
          echo "changed=true" >> $GITHUB_OUTPUT
        fi
    
    - name: Git Push Updated IPTV File
      if: steps.compare.outputs.changed == 'true'
      run: |
        MAIN_BRANCH="main"
        mv new-iptv.m3u iptv-fe.m3u
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add iptv-fe.m3u
        git commit -m "🔄 自动同步IPTV: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
        
        源文件1: migu.m3u
        源文件2: cctv.migu.m3u (自动添加 group-title=\"央视专版\")
        合并后哈希: ${{ steps.download.outputs.new_hash }}"
        git push origin $MAIN_BRANCH
    
    - name: Log no changes skip info
      if: steps.compare.outputs.changed == 'false'
      run: |
        echo "⏭️ $(date -u '+%Y-%m-%d %H:%M:%S UTC') - 源文件无任何变更，跳过提交推送"
