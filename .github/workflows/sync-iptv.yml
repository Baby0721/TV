name: Auto Sync IPTV
on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

jobs:
  sync-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Get old file hash
        id: hash_check
        run: |
          if [ -f "iptv.txt" ]; then
            OLD_HASH=$(sha256sum iptv.txt | awk '{print $1}')
            echo "old_hash=$OLD_HASH" >> $GITHUB_OUTPUT
          else
            echo "old_hash=none" >> $GITHUB_OUTPUT
            echo "旧版iptv.txt不存在，后续将首次生成文件"
          fi

      - name: Download IPTV sources
        id: download
        run: |
          echo "开始拉取远程播放源"
          # 第一个源：咪咕
          curl -s -L --connect-timeout 20 --retry 5 --retry-delay 5 -o migu.m3u "https://raw.githubusercontent.com/ioptu/migu_video/main/migu.m3u"
          if [ ! -s migu.m3u ]; then
            echo "::error::migu源下载失败"
            exit 1
          fi
          # 第二个源：独立CCTV源
          curl -s -L --connect-timeout 20 --retry 5 --retry-delay 5 -o cctv_raw.m3u "https://raw.githubusercontent.com/ioptu/migu_video/main/cctv.migu.m3u"
          if [ ! -s cctv_raw.m3u ]; then
            echo "::error::cctv源下载失败"
            exit 1
          fi
          echo "两个远程源全部下载完毕"

          # 处理第二个源：全部 = 央视专区频道
          awk '/^#EXTINF:/{sub(/.*,/,"",$0);n=$0;next}/^http/{print n","$0}' cctv_raw.m3u \
            | grep -v '^$' | grep -v '^,' > cctv_zone.tmp

          # 解析咪咕全量
          awk '/^#EXTINF:/{sub(/.*,/,"",$0);n=$0;next}/^http/{print n","$0}' migu.m3u \
            | grep -v '^$' | grep -v '^,' > migu_all.tmp

          # migu 拆分三组
          TV_KEY="卫视"
          grep -i "CCTV\|央视" migu_all.tmp > migu_cctv.tmp
          grep -E "$TV_KEY" migu_all.tmp | grep -v -i "CCTV\|央视" > migu_tv.tmp
          grep -v -E "$TV_KEY" migu_all.tmp | grep -v -i "CCTV\|央视" > migu_other.tmp

          # 组装文件，固定顺序
          > new-iptv.txt
          # 1. 央视专区频道（外部cctv_raw源）
          if [ -s cctv_zone.tmp ]; then
            echo "# 央视专区频道" >> new-iptv.txt
            cat cctv_zone.tmp >> new-iptv.txt
          fi
          # 2. 央视频道（migu内CCTV）
          if [ -s migu_cctv.tmp ]; then
            echo -e "\n# 央视频道" >> new-iptv.txt
            cat migu_cctv.tmp >> new-iptv.txt
          fi
          # 3. 卫视频道
          if [ -s migu_tv.tmp ]; then
            echo -e "\n# 卫视频道" >> new-iptv.txt
            cat migu_tv.tmp >> new-iptv.txt
          fi
          # 4. 其他频道
          if [ -s migu_other.tmp ]; then
            echo -e "\n# 其他频道" >> new-iptv.txt
            cat migu_other.tmp >> new-iptv.txt
          fi

          # 校验文件非空
          if [ ! -s new-iptv.txt ]; then
            echo "::error::源文件处理后无有效频道数据"
            exit 1
          fi

          NEW_HASH=$(sha256sum new-iptv.txt | awk '{print $1}')
          echo "new_hash=$NEW_HASH" >> $GITHUB_OUTPUT

          # 清理临时文件
          rm -f migu.m3u cctv_raw.m3u *.tmp

      - name: Compare file hash
        id: compare
        run: |
          OLD_HASH=${{ steps.hash_check.outputs.old_hash }}
          NEW_HASH=${{ steps.hash_check.outputs.new_hash }}
          echo "旧哈希：$OLD_HASH  新哈希：$NEW_HASH"
          [ "$OLD_HASH" != "$NEW_HASH" ] && echo "changed=true" >> $GITHUB_OUTPUT || echo "changed=false" >> $GITHUB_OUTPUT

      - name: Push new iptv.txt
        if: steps.compare.outputs.changed == 'true'
        run: |
          mv new-iptv.txt iptv.txt
          git config --global user.name "Actions Bot"
          git config --global user.email "actions@github.com"
          git add iptv.txt
          git commit -m "Auto update IPTV 分区独立不合并 无去重 $(date -u '+%Y-%m-%d %H:%M')"
          git push origin main
          echo "更新完成：独立央视专区 + 咪咕内分央视频道/卫视/其他频道，不去重"

      - name: No change skip
        if: steps.compare.outputs.changed == 'false'
        run: echo "源内容无变动，跳过更新"
