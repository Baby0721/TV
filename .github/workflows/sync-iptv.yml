name: Auto Sync IPTV with Email
on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

jobs:
  sync-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Get old file hash
        id: hash_check
        run: |
          if [ -f "iptv.txt" ]; then
            OLD_HASH=$(sha256sum iptv.txt | awk '{print $1}')
            echo "old_hash=$OLD_HASH" >> $GITHUB_OUTPUT
          else
            echo "old_hash=none" >> $GITHUB_OUTPUT
            echo "旧版iptv.txt不存在，后续将首次生成文件"
          fi

      - name: Download IPTV sources
        id: download
        run: |
          echo "开始拉取远程播放源"
          curl -s -L --connect-timeout 20 --retry 5 --retry-delay 5 -o migu.m3u "https://raw.githubusercontent.com/ioptu/migu_video/main/migu.m3u"
          if [ ! -s migu.m3u ]; then
            echo "::error::migu源下载失败"
            exit 1
          fi

          curl -s -L --connect-timeout 20 --retry 5 --retry-delay 5 -o cctv_raw.m3u "https://raw.githubusercontent.com/ioptu/migu_video/main/cctv.migu.m3u"
          if [ ! -s cctv_raw.m3u ]; then
            echo "::error::cctv源下载失败"
            exit 1
          fi
          echo "两个远程源全部下载完毕"

          sed -i 's/\(tvg-logo="[^"]*"\)/\1,group-title="央视专版",/' cctv_raw.m3u

          # 1. 单独解析外部央视源
          awk '/^#EXTINF:/{sub(/.*,/,"",$0);n=$0;next}/^http/{print n","$0}' cctv_raw.m3u \
            | grep -v '^$' > cctv_ext.tmp

          # 2. 解析全部咪咕源原始数据
          awk '/^#EXTINF:/{sub(/.*,/,"",$0);n=$0;next}/^http/{print n","$0}' migu.m3u \
            | grep -v '^$' > migu_all.tmp

          # 从咪咕中分离自带CCTV频道，合并进央视组
          grep -i "CCTV\|央视" migu_all.tmp > cctv_migu.tmp
          cat cctv_ext.tmp cctv_migu.tmp | sort -t ',' -k1 -u > cctv_list.tmp

          # 卫视统一关键词，仅匹配卫视，避免地名误分类
          TV_KEY="卫视"
          grep -E "$TV_KEY" migu_all.tmp | grep -v -i "CCTV\|央视" | sort -t ',' -k1 -u > tv_list.tmp

          # 剩余全部归咪咕影视
          grep -v -E "$TV_KEY" migu_all.tmp | grep -v -i "CCTV\|央视" | sort -t ',' -k1 -u > movie_list.tmp

          # 固定顺序输出：央视 → 卫视 → 咪咕影视，无内容不打印标题
          > new-iptv.txt
          if [ -s cctv_list.tmp ]; then
            echo "# 央视专版频道" >> new-iptv.txt
            cat cctv_list.tmp >> new-iptv.txt
          fi

          if [ -s tv_list.tmp ]; then
            echo -e "\n# 卫视频道" >> new-iptv.txt
            cat tv_list.tmp >> new-iptv.txt
          fi

          if [ -s movie_list.tmp ]; then
            echo -e "\n# 咪咕影视频道" >> new-iptv.txt
            cat movie_list.tmp >> new-iptv.txt
          fi

          if [ ! -s new-iptv.txt ]; then
            echo "::error::源文件处理后无有效频道数据"
            exit 1
          fi

          NEW_HASH=$(sha256sum new-iptv.txt | awk '{print $1}')
          echo "new_hash=$NEW_HASH" >> $GITHUB_OUTPUT

          rm -f migu.m3u cctv_raw.m3u *.tmp

      - name: Compare file hash
        id: compare
        run: |
          OLD_HASH=${{ steps.hash_check.outputs.old_hash }}
          NEW_HASH=${{ steps.download.outputs.new_hash }}
          echo "旧哈希：$OLD_HASH  新哈希：$NEW_HASH"
          [ "$OLD_HASH" != "$NEW_HASH" ] && echo "changed=true" >> $GITHUB_OUTPUT || echo "changed=false" >> $GITHUB_OUTPUT

      - name: Push new iptv.txt
        if: steps.compare.outputs.changed == 'true'
        run: |
          mv new-iptv.txt iptv.txt
          git config --global user.name "Actions Bot"
          git config --global user.email "actions@github.com"
          git add iptv.txt
          git commit -m "Auto update IPTV [修正分类+按名称排序] $(date -u '+%Y-%m-%d %H:%M')"
          git push origin main
          echo "IPTV更新完成：分类修正、频道按名称升序排列"

      - name: No change skip
        if: steps.compare.outputs.changed == 'false'
        run: echo "源内容无变动，跳过更新"
