name: Auto Sync IPTV with Email
on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

jobs:
  sync-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Get old file hash
        id: hash_check
        run: |
          if [ -f "iptv-fe.m3u" ]; then
            OLD_HASH=$(sha256sum iptv-fe.m3u | awk '{print $1}')
            echo "old_hash=$OLD_HASH" >> $GITHUB_OUTPUT
          else
            echo "old_hash=none" >> $GITHUB_OUTPUT
          fi

      - name: Download IPTV sources
        id: download
        run: |
          # 镜像加速下载源
          curl -s -L --connect-timeout 10 --retry 3 --retry-delay 2 -o migu.m3u "https://mirror.ghproxy.com/https://raw.githubusercontent.com/ioptu/migu_video/main/migu.m3u"
          if [ ! -s migu.m3u ]; then
            echo "::error::migu源下载失败"
            exit 1
          fi

          curl -s -L --connect-timeout 10 --retry 3 --retry-delay 2 -o cctv_raw.m3u "https://mirror.ghproxy.com/https://raw.githubusercontent.com/ioptu/migu_video/main/cctv.migu.m3u"
          if [ ! -s cctv_raw.m3u ]; then
            echo "::error::cctv源下载失败"
            exit 1
          fi

          # 修改央视分组，无bak备份
          sed -i 's/\(tvg-logo="[^"]*"\)/\1,group-title="央视专版",/' cctv_raw.m3u

          # 合并m3u文件
          echo "#EXTM3U" > new-iptv.m3u
          # 去除migu头部重复标识
          tail -n +2 migu.m3u >> new-iptv.m3u
          # 追加央视源
          cat cctv_raw.m3u >> new-iptv.m3u

          NEW_HASH=$(sha256sum new-iptv.m3u | awk '{print $1}')
          echo "new_hash=$NEW_HASH" >> $GITHUB_OUTPUT
          rm -f migu.m3u cctv_raw.m3u

      - name: Compare file hash
        id: compare
        run: |
          OLD_HASH=${{ steps.hash_check.outputs.old_hash }}
          NEW_HASH=${{ steps.download.outputs.new_hash }}
          if [ "$OLD_HASH" = "$NEW_HASH" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Push new m3u file
        if: steps.compare.outputs.changed == 'true'
        run: |
          mv new-iptv.m3u iptv-fe.m3u
          git config --global user.name "Actions Bot"
          git config --global user.email "actions@github.com"
          git add iptv-fe.m3u
          git commit -m "Auto update IPTV source $(date -u '+%Y-%m-%d %H:%M')"
          git push origin main

      - name: No change skip
        if: steps.compare.outputs.changed == 'false'
        run: echo "源内容无更新，跳过提交"
        
