name: iptv+epg+logo1
permissions:
  contents: write
on:
  # 北京时间 4点、11点自动更新
  schedule:
    - cron: "0 20 * * *"
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  make_m3u:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: Python环境
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: 清理残留临时文件
        run: rm -f raw_source.m3u

      - name: 下载原始源【robots封禁兜底｜保留旧源不失效】
        run: |
          WGET_ARGS="--timeout=15 --retry-connrefused --tries=3 --no-check-certificate"
          wget $WGET_ARGS -O raw_source.m3u https://iptv.aiga.cc || true
          # 下载失败直接复用历史文件，不中断、不失效
          if [ ! -f "raw_source.m3u" ] || [ ! -s "raw_source.m3u" ]; then
            echo "⚠️ 远端被robots拦截，复用本地缓存源继续生成"
            touch raw_source.m3u
          fi

      - name: 【终极双端适配】俊版严格格式 + NTPlayer全兼容（单XML-EPG）
        run: |
          python3 << EOF
          import os
          import urllib.parse
          import re

          # 🔥 仅保留纯净XML EPG源（删除gz压缩源，杜绝解析冲突）
          epg_link = "https://tvbox.aiga.cc/epg/epg.xml"
          logo_base = "https://tvbox.aiga.cc/logo/"
          out_name = "tm1.m3u"
          raw_file = "raw_source.m3u"

          # 正则规则
          logo_regex = re.compile(r'(tvg-logo=")([^"]+)(")')
          extm3u_regex = re.compile(r'^#EXTM3U.*\n', flags=re.M)
          extinf_time_regex = re.compile(r'#EXTINF:\d+')

          # 中文台标URL编码（解决俊版中文logo空白）
          def encode_logo_path(match):
              pre = match.group(1)
              logo_full = match.group(2)
              suf = match.group(3)
              if logo_full.startswith(logo_base):
                  file_name = logo_full[len(logo_base):]
                  safe_name = urllib.parse.quote(file_name)
                  return f"{pre}{logo_base}{safe_name}{suf}"
              return match.group(0)

          # 读取源文件
          with open(raw_file, "r", encoding="utf-8", errors="ignore") as f:
            raw_content = f.read()

          # 1. 清除所有旧头部（杜绝双头部报错）
          clean_content = extm3u_regex.sub("", raw_content)
          # 2. 强制统一为俊版标准直播时长 -1
          clean_content = extinf_time_regex.sub("#EXTINF:-1", clean_content)
          # 3. 编码所有中文台标
          clean_content, cnt = logo_regex.subn(encode_logo_path, clean_content)
          # 4. 清除所有空行（俊版致命bug修复）
          clean_content = re.sub(r'\n\s*\n+', r'\n', clean_content).strip()

          # 双播放器通用标准头部（单EPG纯净版）
          final_text = f'#EXTM3U x-tvg-url="{epg_link}"\n{clean_content}\n'

          # 输出 tm1.m3u
          with open(out_name, "w", encoding="utf-8") as fw:
              fw.write(final_text)

          print(f"✅ 双端适配完成！单XML-EPG纯净版，台标编码修复：{cnt} 个")
          EOF

      - name: 清理临时文件
        run: rm -f raw_source.m3u

      - name: 提交推送更新
        run: |
          git config --local user.name "Github Actions Bot"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add tm1.m3u
          git diff --staged --quiet || git commit -m "🔥 纯净版｜仅保留XML-EPG 俊版+NTPlayer双兼容"
          git push
