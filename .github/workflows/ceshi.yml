name: iptv+epg+logo1
permissions:
  contents: write
on:
  # UTC 20点 = 北京时间4点
  # UTC 3点 = 北京时间11点
  schedule:
    - cron: "0 20 * * *"
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  make_m3u:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: Python环境
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: 清理残留临时文件
        run: rm -f raw_source.m3u

      - name: 下载原始M3U源（失败重试+空文件校验）
        run: |
          WGET_ARGS="--timeout=15 --retry-connrefused --tries=3 --no-check-certificate"
          echo "开始下载源文件 https://iptv.aiga.cc"
          wget $WGET_ARGS -O raw_source.m3u https://iptv.aiga.cc || true
          if [ ! -f "raw_source.m3u" ] || [ ! -s "raw_source.m3u" ]; then
            echo "错误：源文件下载失败或为空，终止任务"
            exit 1
          fi
          echo "源文件下载完成，文件大小: $(du -h raw_source.m3u)"

      - name: 【俊版TVbox标准】重制M3U｜标准EPG头｜台标编码｜格式归一
        run: |
          python3 << EOF
          import os
          import urllib.parse
          import re

          # 俊版TVbox 官方标准 EPG 双源
          epg_xml = "https://tvbox.aiga.cc/epg/epg.xml"
          epg_gz = "https://tvbox.aiga.cc/epg/epg.gz"

          logo_base = "https://tvbox.aiga.cc/logo/"
          out_name = "tm1.m3u"
          raw_file = "raw_source.m3u"

          # 正则规则
          logo_regex = re.compile(r'(tvg-logo=")([^"]+)(")')
          extm3u_regex = re.compile(r'^#EXTM3U.*\n', flags=re.M)
          extinf_time_regex = re.compile(r'#EXTINF:\d+')

          # 中文台标URL编码修复
          def encode_logo_path(match):
              pre = match.group(1)
              logo_full = match.group(2)
              suf = match.group(3)
              if logo_full.startswith(logo_base):
                  file_name = logo_full[len(logo_base):]
                  safe_name = urllib.parse.quote(file_name)
                  return f"{pre}{logo_base}{safe_name}{suf}"
              return match.group(0)

          # 读取源文件
          with open(raw_file, "r", encoding="utf-8", errors="ignore") as f:
              raw_content = f.read()

          # 1. 清除所有旧头部
          clean_content = extm3u_regex.sub("", raw_content)
          # 2. 所有频道统一为直播标准时长 -1
          clean_content = extinf_time_regex.sub("#EXTINF:-1", clean_content)
          # 3. 修复中文台标
          clean_content, cnt = logo_regex.subn(encode_logo_path, clean_content)
          # 4. 清理多余空行
          clean_content = re.sub(r'\n\s*\n+', r'\n', clean_content).strip()

          # ✅ 俊版TVbox【纯正官方标准头部】
          # 双EPG分行、支持压缩包+xml，俊版独家识别格式
          final_text = (
              "#EXTM3U\n"
              f'#tvg-epg="{epg_xml}"\n'
              f'#tvg-epg="{epg_gz}"\n'
              f"{clean_content}\n"
          )

          # 输出最终文件
          with open(out_name, "w", encoding="utf-8") as fw:
              fw.write(final_text)

          print(f"✅ 俊版标准M3U生成完成，台标修复数量：{cnt}")
          EOF

      - name: 清理临时文件
        run: rm -f raw_source.m3u

      - name: 提交推送更新
        run: |
          git config --local user.name "Github Actions Bot"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add tm1.m3u
          git diff --staged --quiet || git commit -m "✅ 俊版TVbox标准EPG+LOGO完整版"
          git push
