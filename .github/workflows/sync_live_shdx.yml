name: sync_live_shdx
permissions:
  contents: write
on:
  schedule:
    # 北京时间11:00 UTC03:00
    - cron: "00 23 * * *"
  workflow_dispatch:

jobs:
  sync_shdx:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 创建live目录
        run: mkdir -p live

      - name: 下载合并上海电信2、3为shdx.txt
        run: |
          WGET_ARGS="--timeout=15 --retry-connrefused --tries=3 --no-check-certificate"
          # 清空旧文件
          > live/shdx.txt
          # 仅保留 上海电信2.txt、上海电信3.txt
          wget $WGET_ARGS -O tmp2.txt https://raw.githubusercontent.com/jia070310/4K-IPTV-M3U/main/txt/上海电信2.txt || true
          wget $WGET_ARGS -O tmp3.txt https://raw.githubusercontent.com/jia070310/4K-IPTV-M3U/main/txt/上海电信3.txt || true
          # 合并写入
          cat tmp2.txt tmp3.txt >> live/shdx.txt
          # 删除临时文件
          rm -f tmp2.txt tmp3.txt

      - name: Git提交
        run: |
          git config --global user.name "Github Actions Bot"
          git config --global user.email "bot@github.com"
          git remote set-url origin https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add live/
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto update shdx live source"
          git push
